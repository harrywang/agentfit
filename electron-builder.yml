appId: com.agentfit.app
productName: AgentFit
copyright: Copyright © 2026 Harry Wang

directories:
  output: dist-electron

files:
  - "electron/**/*"
  - "package.json"
  - "!node_modules"
  # Standalone Next server ships its own node_modules under electron/server/.
  # The `!node_modules` glob above is unscoped and matches at any depth, so
  # without these re-includes the server's @libsql/client and Prisma's
  # hash-suffixed @prisma/client-* (referenced by name from the turbopack
  # chunks under .next/) get stripped and the server fails to boot.
  - "electron/server/node_modules/**/*"
  - "electron/server/.next/node_modules/**/*"
  # electron-updater + its transitive runtime deps. Loaded by main.mjs to
  # check GitHub releases for new versions on startup.
  - "node_modules/electron-updater/**/*"
  - "node_modules/builder-util-runtime/**/*"
  - "node_modules/sax/**/*"
  - "node_modules/fs-extra/**/*"
  - "node_modules/graceful-fs/**/*"
  - "node_modules/jsonfile/**/*"
  - "node_modules/universalify/**/*"
  - "node_modules/js-yaml/**/*"
  - "node_modules/argparse/**/*"
  - "node_modules/sprintf-js/**/*"
  - "node_modules/lazy-val/**/*"
  - "node_modules/lodash.escaperegexp/**/*"
  - "node_modules/lodash.isequal/**/*"
  - "node_modules/semver/**/*"
  - "node_modules/tiny-typed-emitter/**/*"
  - "node_modules/sumchecker/**/*"
  - "node_modules/debug/**/*"
  - "node_modules/ms/**/*"
  - "!dist-electron"
  - "!data"
  - "!agentfit.db"
  - "!tests"
  - "!src"
  - "!app"
  - "!lib"
  - "!components"
  - "!hooks"
  - "!public"
  - "!prisma"
  - "!generated"
  - "!build"
  - "!scripts"
  - "!bin"

publish:
  provider: github
  owner: harrywang
  repo: agentfit
  releaseType: release

asarUnpack:
  - "electron/server/**/*"
  - "electron/init-db.mjs"

extraResources:
  - from: "prisma"
    to: "prisma"
    filter:
      - "**/*"
  - from: "generated"
    to: "generated"
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false

dmg:
  title: "AgentFit"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: "/Applications"
